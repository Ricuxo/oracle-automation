---
# =============================================================================
# oradb_healthcheck – Validações de listener
# =============================================================================

- name: "check_listener | Verificar status listener filesystem"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ oracle_home }}
    {{ oracle_home }}/bin/lsnrctl status {{ oracle_listener_name | default('LISTENER') }}
  become: true
  become_user: "{{ oracle_user }}"
  register: _lsnr_fs_check
  changed_when: false
  failed_when: false
  when: oracle_storage_type == 'filesystem'
  tags: [check_listener]

- name: "check_listener | Assert listener filesystem rodando"
  ansible.builtin.assert:
    that: "'TNS-12541' not in _lsnr_fs_check.stdout"
    fail_msg: >
      Listener {{ oracle_listener_name | default('LISTENER') }}
      não está rodando em {{ inventory_hostname }}.
  when: oracle_storage_type == 'filesystem'
  tags: [check_listener]

- name: "check_listener | Verificar status listener Grid"
  ansible.builtin.shell: |
    export ORACLE_HOME={{ grid_home }}
    {{ grid_home }}/bin/lsnrctl status
  become: true
  become_user: "{{ grid_user }}"
  register: _lsnr_grid_check
  changed_when: false
  failed_when: false
  when: oracle_storage_type == 'asm'
  tags: [check_listener]

- name: "check_listener | Assert listener Grid rodando"
  ansible.builtin.assert:
    that: "'TNS-12541' not in _lsnr_grid_check.stdout"
    fail_msg: >
      Listener Grid não está rodando em {{ inventory_hostname }}.
  when: oracle_storage_type == 'asm'
  tags: [check_listener]

- name: "check_listener | Verificar porta listener"
  ansible.builtin.shell: |
    ss -tlnp | grep {{ oracle_listener_port | default(1521) }}
  register: _listener_port_check
  changed_when: false
  failed_when: false
  tags: [check_listener]

- name: "check_listener | Assert porta listener aberta"
  ansible.builtin.assert:
    that: _listener_port_check.rc == 0
    fail_msg: >
      Porta {{ oracle_listener_port | default(1521) }}
      não está aberta em {{ inventory_hostname }}.
  tags: [check_listener]

- name: "check_listener | Exibir resumo listener"
  ansible.builtin.debug:
    msg:
      - "Host: {{ inventory_hostname }}"
      - "Storage type: {{ oracle_storage_type }}"
      - "Porta {{ oracle_listener_port | default(1521) }}: {{ 'OK' if _listener_port_check.rc == 0 else 'FALHOU' }}"
      - "Listener: {{ 'OK' if (oracle_storage_type == 'filesystem' and 'TNS-12541' not in _lsnr_fs_check.stdout) or (oracle_storage_type == 'asm' and 'TNS-12541' not in _lsnr_grid_check.stdout) else 'FALHOU' }}"
  tags: [check_listener]