---
# =============================================================================
# oradb_install – Descompactar instalador RDBMS
# =============================================================================

- name: "stage | Criar diretório oracle_home"
  ansible.builtin.file:
    path: "{{ oracle_home }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: "0775"
  tags: [stage]

- name: "stage | Descompactar instalador RDBMS"
  ansible.builtin.unarchive:
    src: "{{ rdbms_installer_path }}"
    dest: "{{ oracle_home }}"
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    remote_src: true
    creates: "{{ oracle_home }}/runInstaller"
  become: true
  become_user: "{{ oracle_user }}"
  tags: [stage]

- name: "stage | Verificar se runInstaller existe"
  ansible.builtin.stat:
    path: "{{ oracle_home }}/runInstaller"
  register: _runinstaller_stat
  tags: [stage]

- name: "stage | Falhar se runInstaller não encontrado"
  ansible.builtin.assert:
    that: _runinstaller_stat.stat.exists
    fail_msg: >
      runInstaller não encontrado em {{ oracle_home }}.
      Verifique se o instalador foi descompactado corretamente.
  tags: [stage]