---
# =============================================================================
# oradb_install – Executar instalação RDBMS
# =============================================================================

- name: "install | Executar runInstaller silent"
  ansible.builtin.shell: |
    set -o pipefail
    {{ oracle_home }}/runInstaller \
      -silent \
      -ignorePrereqFailure \
      -responseFile {{ rdbms_response_file }} \
      2>&1 | tee /tmp/rdbms_install_{{ ansible_date_time.epoch }}.log
  become: true
  become_user: "{{ oracle_user }}"
  register: _rdbms_install
  changed_when: "'Successfully Setup Software' in _rdbms_install.stdout"
  failed_when:
    - _rdbms_install.rc != 0
    - "'Successfully Setup Software' not in _rdbms_install.stdout"
  async: 3600
  poll: 30
  tags: [install]

- name: "install | Exibir resultado da instalação"
  ansible.builtin.debug:
    msg: "RDBMS install rc={{ _rdbms_install.rc }}"
  tags: [install]

- name: "install | Salvar log de instalação"
  ansible.builtin.fetch:
    src: "/tmp/rdbms_install_{{ ansible_date_time.epoch }}.log"
    dest: "logs/rdbms_install_{{ inventory_hostname }}_{{ ansible_date_time.epoch }}.log"
    flat: true
  failed_when: false
  tags: [install]