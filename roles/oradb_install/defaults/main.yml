---
# =============================================================================
# oradb_install – Default Variables
# Responsabilidade: instalação do software RDBMS Oracle
# =============================================================================

# ── Versão Oracle ─────────────────────────────────────────────────────────────
oracle_version: "19.3.0"
oracle_version_major: "19"
oracle_edition: EE               # EE | SE2

# ── Usuários e grupos ─────────────────────────────────────────────────────────
oracle_user: oracle
oracle_group: oinstall
oracle_dba_group: dba
oracle_oper_group: oper
oracle_backupdba_group: backupdba
oracle_dgdba_group: dgdba
oracle_kmdba_group: kmdba
oracle_racdba_group: racdba

# ── Diretórios ────────────────────────────────────────────────────────────────
oracle_base: /u01/app/oracle
oracle_inventory_location: /u01/app/oraInventory
oracle_home_base: /u01/app/oracle/product
oracle_home: "{{ oracle_home_base }}/{{ oracle_version }}/dbhome_1"

# ── Tipo de deployment ────────────────────────────────────────────────────────
# Valores válidos: standalone | rac
oracle_deployment_type: standalone

# ── Instalador ────────────────────────────────────────────────────────────────
oracle_stage_dir: /software/oracle
rdbms_installer_zip: "LINUX.X64_193000_db_home.zip"
rdbms_installer_path: "{{ oracle_stage_dir }}/{{ rdbms_installer_zip }}"
rdbms_response_file: "{{ oracle_stage_dir }}/db_install.rsp"

# ── RAC – nós do cluster ──────────────────────────────────────────────────────
oracle_cluster_nodes: []
# Exemplo:
# oracle_cluster_nodes:
#   - { hostname: rac-node1, vip: rac-node1-vip }
#   - { hostname: rac-node2, vip: rac-node2-vip }