---
# =============================================================================
# orahost_os_prereqs – Tasks
# Responsabilidade: pré-requisitos de SO via oracle-preinstall
# =============================================================================

- name: "orahost_os_prereqs | Instalar oracle-database-preinstall"
  ansible.builtin.package:
    name: "{{ oracle_preinstall_package }}"
    state: present
  retries: 3
  delay: 10
  register: _preinstall_result
  until: _preinstall_result is succeeded
  tags: [orahost_os_prereqs, packages]

- name: "orahost_os_prereqs | Configurar SELinux"
  ansible.posix.selinux:
    policy: targeted
    state: "{{ oracle_selinux_state }}"
  tags: [orahost_os_prereqs, selinux]

- name: "orahost_os_prereqs | Desabilitar Transparent HugePages"
  ansible.builtin.import_tasks: thp.yml
  when: oracle_thp_disable | bool
  tags: [orahost_os_prereqs, thp]

- name: "orahost_os_prereqs | Configurar HugePages"
  ansible.builtin.import_tasks: hugepages.yml
  when: oracle_hugepages_enable | bool
  tags: [orahost_os_prereqs, hugepages]

- name: "orahost_os_prereqs | Configurar NTP/Chrony"
  ansible.builtin.import_tasks: ntp.yml
  tags: [orahost_os_prereqs, ntp]

- name: "orahost_os_prereqs | Configurar Firewall"
  ansible.builtin.import_tasks: firewall.yml
  when: oracle_firewall_manage | bool
  tags: [orahost_os_prereqs, firewall]