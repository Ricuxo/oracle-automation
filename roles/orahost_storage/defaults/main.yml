---
# =============================================================================
# orahost_storage – Default Variables
# Responsabilidade: configuração de filesystem para Oracle
# Utilizado quando oracle_storage_type = filesystem
# =============================================================================

# ── Tipo de storage ───────────────────────────────────────────────────────────
oracle_storage_type: filesystem

# ── Usuários e grupos ─────────────────────────────────────────────────────────
oracle_user: oracle
oracle_group: oinstall

# ── Filesystem type ───────────────────────────────────────────────────────────
# Valores válidos: xfs | ext4
oracle_fs_type: xfs

# ── Opções de montagem ────────────────────────────────────────────────────────
oracle_fs_mount_opts: "defaults,noatime,nodiratime"

# ── Definição dos volumes ─────────────────────────────────────────────────────
# Cada item representa um disco/partição a ser configurado
oracle_fs_volumes: []
